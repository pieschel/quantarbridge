  id: 9000110
  address: 127.0.0.1
  port: 62031
  password: "LOCAL_FNE_PASSWORD"
  encrypted: false
  presharedKey: ""
  jitter: 360
  slot1: false
  slot2: true
  updateLookups: false
  saveLookups: false
  talkgroupHang: 30
  allowActivityTransfer: true
  allowDiagnosticTransfer: true
  allowStatusTransfer: true
  packetDump: false
  debug: false
  rpcAddress: 127.0.0.1
  rpcPort: 9890
  rpcPassword: ""
  rpcDebug: false
  restEnable: false

protocols:
  dmr:
    enable: false
  p25:

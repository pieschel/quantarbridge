        rpcAddress: 127.0.0.1
        rpcPort: 0
        rpcPassword: ""
    secure:
      key: ""
    colorCode: 1
    nac: 293
    ran: 1
    pSuperGroup: FFFE
    announcementGroup: FFFE
    defaultNetIdleTalkgroup: 0
    dmrNetId: 1
    netId: BB800

    tduPreambleCount: 6
    motorolaPacketData:
      arsServerAddress: 10.0.0.2
      arsPeerAddress: 10.0.0.1
    motorolaLocation:
      initialDelaySeconds: 5
      updateIntervalSeconds: 300
      noFixRetrySeconds: 60
    control:
      enable: false
      dedicated: false
      broadcast: false
      disableGrantSourceIdCheck: false
      explicitTDUGrantRelease: true
      redundantImmediate: true
      redundantGrantTransmit: false
    controlOnly: false
    disableNetworkHDU: false
    disableNetworkGrant: false
    forceAllowTG0: false
    ignoreAffiliationCheck: false
    immediateCallTerm: false
    inhibitUnauthorized: false
    legacyGroupGrnt: true
    legacyGroupReg: false
    convNetGrantDemand: false
    demandUnitRegForRefusedAff: false
    verifyAff: false
    verifyReg: false
    disableUnitRegTimeout: false
    requireLLAForReg: false
    dumpDataPacket: false
    repeatDataPacket: false
    ignoreDataCRC: false
    dumpTsbkData: false
    callHang: 30
    noStatusAck: false
    noMessageAck: true
    unitToUnitAvailCheck: false
    allowExplicitSourceId: false
    disableDenyResponse: false
    sndcpSupport: true
    silenceThreshold: 124
    frameLossThreshold: 12
    queueSize: 50
    verbose: false
    debug: false
  nxdn:
    enable: false

